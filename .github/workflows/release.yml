name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least-privilege default for the auto-injected GITHUB_TOKEN. The publish jobs
# push to external registries via their own secrets, not the GITHUB_TOKEN, so
# they need no repo write. The jobs that genuinely write through the
# GITHUB_TOKEN (github-release, node-/wasm-publish provenance, attestations)
# declare those rights in their own job-level permissions blocks.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Network-flake resilience: retry transient registry/DNS failures at the tool
  # level so a blip fetching crates.io / npm inside any build or publish step
  # retries automatically instead of failing the job.
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  npm_config_fetch_retries: "5"
  npm_config_fetch_retry_maxtimeout: "120000"
  PIP_RETRIES: "5"
  PIP_DEFAULT_TIMEOUT: "120"

jobs:
  # --------------------------------------------------------------------------
  # crates.io: strategy-ci-core then the wickra-strategy-ci-cli crate (wickra-strategy-ci binary)
  # --------------------------------------------------------------------------
  cargo-publish:
    name: Publish to crates.io
    timeout-minutes: 45
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Idempotent publishing: if the version is already on crates.io we treat
      # that as success so re-runs of the workflow do not fail.
      - name: Publish strategy-ci-core (idempotent)
        run: |
          out=$(cargo publish -p strategy-ci-core --token "$CARGO_REGISTRY_TOKEN" 2>&1) && echo "$out" \
            || (echo "$out" | grep -q "already uploaded\|already exists" && echo "skip: already published" \
                || (echo "$out"; exit 1))
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index to refresh
        run: sleep 45

      - name: Publish wickra-strategy-ci-cli (idempotent)
        run: |
          out=$(cargo publish -p wickra-strategy-ci-cli --token "$CARGO_REGISTRY_TOKEN" 2>&1) && echo "$out" \
            || (echo "$out" | grep -q "already uploaded\|already exists" && echo "skip: already published" \
                || (echo "$out"; exit 1))
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Produce .crate files for the GitHub Release attachments.
      - name: Build .crate files for release attachment
        run: |
          cargo package -p strategy-ci-core
          cargo package -p wickra-strategy-ci-cli

      - name: Upload .crate files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crate-files
          path: target/package/*.crate

      # CycloneDX SBOM per published crate.
      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-cyclonedx

      - name: Generate CycloneDX SBOMs
        run: |
          cargo cyclonedx --format json --top-level
          mkdir -p sboms
          cp crates/strategy-ci-core/strategy-ci-core.cdx.json sboms/
          cp crates/wickra-strategy-ci-cli/wickra-strategy-ci-cli.cdx.json sboms/
          ls -lh sboms/

      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sboms
          path: sboms/*.cdx.json

  # --------------------------------------------------------------------------
  # PyPI: cross-platform wheels + sdist
  # --------------------------------------------------------------------------
  python-wheels:
    name: Build wheels (${{ matrix.target }}/${{ matrix.manylinux }} on ${{ matrix.os }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64, manylinux: auto }
          - { os: ubuntu-latest, target: aarch64, manylinux: auto }
          - { os: ubuntu-latest, target: x86_64, manylinux: musllinux_1_2 }
          - { os: ubuntu-latest, target: aarch64, manylinux: musllinux_1_2 }
          - { os: macos-latest, target: x86_64, manylinux: auto }
          - { os: macos-latest, target: aarch64, manylinux: auto }
          - { os: windows-latest, target: x64, manylinux: auto }
          - { os: windows-11-arm, target: aarch64, manylinux: auto }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Sync root README into bindings/python so it ships with the wheel
        shell: bash
        run: cp README.md bindings/python/README.md
      # The Python binding depends only on strategy-ci-core (pure canonicalization +
      # hashing, no native networking), so the manylinux/musllinux containers
      # build the wheel with no extra system dependencies.
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          args: --release --strip --out dist
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}-${{ matrix.manylinux }}
          path: bindings/python/dist/*

  python-sdist:
    name: Build Python sdist
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Sync root README into bindings/python so it ships in the sdist
        run: cp README.md bindings/python/README.md
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: bindings/python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-sdist
          path: bindings/python/dist/*

  python-publish:
    name: Publish to PyPI
    timeout-minutes: 45
    needs: [python-wheels, python-sdist]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: Upload to PyPI
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: upload
          args: --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # --------------------------------------------------------------------------
  # npm: per-platform native binaries + main meta-package
  # --------------------------------------------------------------------------
  node-build:
    name: Node build (${{ matrix.target }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { host: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { host: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { host: macos-latest, target: x86_64-apple-darwin }
          - { host: macos-latest, target: aarch64-apple-darwin }
          - { host: windows-latest, target: x86_64-pc-windows-msvc }
          - { host: windows-11-arm, target: aarch64-pc-windows-msvc }
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # npm install (not ci): the per-platform optionalDependencies are not yet
      # published, so they are absent from the lock and npm ci would reject it.
      - name: Install Node deps
        run: cd bindings/node && npm install --no-audit --no-fund
      - name: Build native module
        working-directory: bindings/node
        run: npx napi build --platform --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-${{ matrix.target }}
          path: bindings/node/wickra-strategy-ci.*.node
          if-no-files-found: error

  node-publish:
    name: Publish to npm
    timeout-minutes: 45
    needs: node-build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # Sigstore provenance from the GitHub OIDC token
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install Node deps
        run: cd bindings/node && npm install --no-audit --no-fund
      - name: Download all platform binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: bindings/node/artifacts
          pattern: bindings-*
      # The npm/<platform>/package.json templates are committed (bindings/node/npm/),
      # so `napi artifacts` only drops the freshly built .node binary into the
      # matching directory. napi-rs CLI 3 renamed `--dir` to `--output-dir`.
      - name: Move binaries into platform package layout
        working-directory: bindings/node
        run: npx napi artifacts --output-dir artifacts

      - name: Publish platform packages (idempotent)
        working-directory: bindings/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          version=$(node -p "require('./package.json').version")
          fail=0
          publish_dir() {
            local dir=$1
            local pkg=$(basename "$dir")
            local pkgname="wickra-strategy-ci-$pkg"
            local existing
            existing=$(npm view "$pkgname@$version" version 2>/dev/null)
            if [ "$existing" = "$version" ]; then
              echo "::notice::skip $pkgname@$version (already on npm)"
              return 0
            fi
            echo "::group::publish $pkgname@$version"
            (cd "$dir" && npm publish --access public --ignore-scripts --provenance)
            local rc=$?
            echo "::endgroup::"
            if [ "$rc" -ne 0 ]; then
              echo "::warning::first attempt of $pkgname failed (rc=$rc); retrying after 30s"
              sleep 30
              (cd "$dir" && npm publish --access public --ignore-scripts --provenance)
              rc=$?
            fi
            if [ "$rc" -ne 0 ]; then
              echo "::error::$pkgname could not be published — the release would land with a missing platform binary; failing the job."
              return 1
            fi
            return 0
          }
          for dir in npm/*/; do
            publish_dir "$dir" || fail=1
          done
          exit $fail

      - name: Sync root README into bindings/node so it ships with the npm tarball
        shell: bash
        run: cp ../../README.md README.md
        working-directory: bindings/node

      - name: Publish main package to npm (idempotent)
        working-directory: bindings/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set +e
          version=$(node -p "require('./package.json').version")
          existing=$(npm view "wickra-strategy-ci@$version" version 2>/dev/null)
          if [ "$existing" = "$version" ]; then
            echo "::notice::skip wickra-strategy-ci@$version (already on npm)"
            exit 0
          fi
          npm publish --access public --ignore-scripts --provenance
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "::warning::first attempt failed (rc=$rc); retrying after 30s"
            sleep 30
            npm publish --access public --ignore-scripts --provenance
            rc=$?
          fi
          exit $rc

      - name: Pack node tarballs for release attachment
        working-directory: bindings/node
        run: |
          npm pack --ignore-scripts
          for d in npm/*/; do
            (cd "$d" && npm pack --ignore-scripts)
          done

      - name: Upload Node tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: node-tarballs
          path: |
            bindings/node/*.tgz
            bindings/node/npm/*/*.tgz

  # --------------------------------------------------------------------------
  # WASM: wasm-pack build + npm publish (as `wickra-strategy-ci-wasm`)
  # --------------------------------------------------------------------------
  wasm-publish:
    name: Publish wickra-strategy-ci-wasm to npm
    timeout-minutes: 45
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # Sigstore provenance from the GitHub OIDC token
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install wasm-pack (latest, via prebuilt binary)
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: wasm-pack
      - name: Build WASM package (bundler target)
        run: wasm-pack build bindings/wasm --target bundler --release
      - name: Enrich generated package.json with author + repo metadata
        working-directory: bindings/wasm/pkg
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.author = 'kingchenc <support@wickra.org>';
            pkg.repository = { type: 'git', url: 'https://github.com/wickra-lib/wickra-strategy-ci' };
            pkg.homepage = 'https://github.com/wickra-lib/wickra-strategy-ci';
            pkg.bugs = { url: 'https://github.com/wickra-lib/wickra-strategy-ci/issues' };
            pkg.license = 'MIT OR Apache-2.0';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
      - name: Pack wickra-strategy-ci-wasm for release attachment
        working-directory: bindings/wasm/pkg
        run: npm pack
      - name: Upload WASM tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wasm-tarball
          path: bindings/wasm/pkg/wickra-strategy-ci-wasm-*.tgz
      - name: Publish wickra-strategy-ci-wasm to npm (idempotent)
        working-directory: bindings/wasm/pkg
        run: |
          out=$(npm publish --access public --provenance 2>&1) && echo "$out" \
            || (echo "$out" | grep -q "You cannot publish over" && echo "skip: version already on npm" \
                || (echo "$out"; exit 1))
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # --------------------------------------------------------------------------
  # CLI binaries: build the wickra-strategy-ci executable per platform on a native
  # runner and attach it to the GitHub Release (in addition to `cargo install`).
  # --------------------------------------------------------------------------
  cli-binaries:
    name: CLI binary (${{ matrix.target }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { host: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { host: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { host: macos-latest, target: x86_64-apple-darwin }
          - { host: macos-latest, target: aarch64-apple-darwin }
          - { host: windows-latest, target: x86_64-pc-windows-msvc }
          - { host: windows-11-arm, target: aarch64-pc-windows-msvc }
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build the CLI binary
        run: cargo build -p wickra-strategy-ci-cli --release --target ${{ matrix.target }}
      - name: Package the binary
        shell: bash
        run: |
          set -e
          dir="wickra-strategy-ci-${{ matrix.target }}"
          mkdir -p "$dir"
          bin="target/${{ matrix.target }}/release/wickra-strategy-ci"
          if [ -f "$bin.exe" ]; then
            cp "$bin.exe" "$dir/"
          else
            cp "$bin" "$dir/"
          fi
          cp README.md LICENSE-MIT LICENSE-APACHE "$dir/"
          tar -czf "$dir.tar.gz" "$dir"
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-${{ matrix.target }}
          path: wickra-strategy-ci-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # C ABI native libraries (bindings/c) — built per target, attached to the
  # GitHub Release and consumed by the C#, Java and Go publish jobs.
  # --------------------------------------------------------------------------
  c-abi-build:
    name: C ABI library (${{ matrix.target }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { host: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { host: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { host: macos-latest, target: x86_64-apple-darwin }
          - { host: macos-latest, target: aarch64-apple-darwin }
          - { host: windows-latest, target: x86_64-pc-windows-msvc }
          - { host: windows-11-arm, target: aarch64-pc-windows-msvc }
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build the C ABI library (cdylib + staticlib)
        run: cargo build -p wickra-strategy-ci-c --release --target ${{ matrix.target }}
      - name: Package header + libraries
        shell: bash
        run: |
          set -e
          dir="wickra-strategy-ci-c-${{ matrix.target }}"
          mkdir -p "$dir/include" "$dir/lib"
          cp bindings/c/include/wickra_strategy_ci.h "$dir/include/"
          for f in libwickra_strategy_ci.so libwickra_strategy_ci.a libwickra_strategy_ci.dylib wickra_strategy_ci.dll wickra_strategy_ci.dll.lib wickra_strategy_ci.lib; do
            src="target/${{ matrix.target }}/release/$f"
            [ -f "$src" ] && cp "$src" "$dir/lib/"
          done
          tar -czf "$dir.tar.gz" "$dir"
          echo "packaged $dir:"; ls -lR "$dir"
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: c-abi-${{ matrix.target }}
          path: wickra-strategy-ci-c-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  # Pack and publish the .NET binding to NuGet. Authentication uses NuGet Trusted
  # Publishing (OIDC) — no long-lived API key. Configure the trusted-publishing
  # policy on nuget.org (owner KingchenC, repo wickra-lib/wickra-strategy-ci,
  # workflow release.yml) for the Wickra.StrategyCi package.
  csharp-publish:
    name: Publish to NuGet
    timeout-minutes: 45
    needs: c-abi-build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # GitHub OIDC token for trusted publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download the C ABI native libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: c-abi-*
          path: c-abi-artifacts
      - name: Stage native libraries into runtimes/<rid>/native
        shell: bash
        run: |
          set -e
          declare -A RID=(
            [x86_64-unknown-linux-gnu]=linux-x64
            [aarch64-unknown-linux-gnu]=linux-arm64
            [x86_64-apple-darwin]=osx-x64
            [aarch64-apple-darwin]=osx-arm64
            [x86_64-pc-windows-msvc]=win-x64
            [aarch64-pc-windows-msvc]=win-arm64
          )
          base=bindings/csharp/WickraStrategyCi/runtimes
          for target in "${!RID[@]}"; do
            archive=$(find c-abi-artifacts -name "wickra-strategy-ci-c-$target.tar.gz" | head -1)
            if [ -z "$archive" ]; then
              echo "::error::missing native artifact for $target"; exit 1
            fi
            tmp=$(mktemp -d); tar -xzf "$archive" -C "$tmp"
            dest="$base/${RID[$target]}/native"; mkdir -p "$dest"
            for f in libwickra_strategy_ci.so libwickra_strategy_ci.dylib wickra_strategy_ci.dll; do
              src=$(find "$tmp" -name "$f" | head -1)
              [ -n "$src" ] && cp "$src" "$dest/"
            done
            echo "staged ${RID[$target]}:"; ls -l "$dest"
          done
      - name: Pack
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 20
          shell: bash
          command: |
            version="${GITHUB_REF_NAME#v}"
            dotnet pack bindings/csharp/WickraStrategyCi/WickraStrategyCi.csproj -c Release -p:Version="$version" -o nupkg
      - name: NuGet login (OIDC -> temporary API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: nuget_login
        with:
          user: KingchenC
      - name: Push to NuGet
        shell: bash
        env:
          NUGET_API_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
        run: |
          dotnet nuget push "nupkg/*.nupkg" --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Upload the NuGet package as a build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-package
          path: nupkg/*.nupkg
          if-no-files-found: error

  # Publish the Java binding to Maven Central. The org.wickra namespace is
  # verified; auth uses the Sonatype Central token (CENTRAL_USERNAME /
  # CENTRAL_PASSWORD) and artifacts are GPG-signed (GPG_PRIVATE_KEY /
  # GPG_PASSPHRASE). The pom version must match the release tag.
  java-publish:
    name: Publish to Maven Central
    timeout-minutes: 45
    needs: c-abi-build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download the C ABI native libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: c-abi-*
          path: c-abi-artifacts
      - name: Stage native libraries into resources/native/<os>-<arch>
        shell: bash
        run: |
          set -e
          declare -A PLAT=(
            [x86_64-unknown-linux-gnu]=linux-x64
            [aarch64-unknown-linux-gnu]=linux-arm64
            [x86_64-apple-darwin]=osx-x64
            [aarch64-apple-darwin]=osx-arm64
            [x86_64-pc-windows-msvc]=win-x64
            [aarch64-pc-windows-msvc]=win-arm64
          )
          base=bindings/java/src/main/resources/native
          for target in "${!PLAT[@]}"; do
            archive=$(find c-abi-artifacts -name "wickra-strategy-ci-c-$target.tar.gz" | head -1)
            if [ -z "$archive" ]; then
              echo "::error::missing native artifact for $target"; exit 1
            fi
            tmp=$(mktemp -d); tar -xzf "$archive" -C "$tmp"
            dest="$base/${PLAT[$target]}"; mkdir -p "$dest"
            for f in libwickra_strategy_ci.so libwickra_strategy_ci.dylib wickra_strategy_ci.dll; do
              src=$(find "$tmp" -name "$f" | head -1)
              [ -n "$src" ] && cp "$src" "$dest/"
            done
            echo "staged ${PLAT[$target]}:"; ls -l "$dest"
          done
      - name: Set up JDK 25 + Maven Central credentials + GPG
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "25"
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Deploy to Maven Central
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -f bindings/java -Prelease deploy -DskipTests

  # The Go binding lives in-repo (module path
  # github.com/wickra-lib/wickra-strategy-ci/bindings/go), so the Go "release" is
  # a sub-directory module tag `bindings/go/v<version>` on this same repo — no
  # separate mirror, no extra secret. cgo consumers build the C ABI themselves
  # (its README documents this); the tag carries source only.
  go-tag:
    name: Tag the in-repo Go module
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
      # The Go binding lives in-repo at bindings/go with module path
      # github.com/wickra-lib/wickra-strategy-ci/bindings/go, so the release is a
      # sub-directory module tag on this same repo (not a separate mirror). The
      # cgo consumer builds the C ABI itself; the tag carries source only.
      - name: Tag bindings/go/v<version>
        shell: bash
        run: |
          set -e
          version="${GITHUB_REF_NAME#v}"
          gotag="bindings/go/v$version"
          if git rev-parse -q --verify "refs/tags/$gotag" >/dev/null; then
            echo "$gotag already exists; nothing to do"
            exit 0
          fi
          git tag "$gotag" "$GITHUB_SHA"
          git push origin "$gotag"
          echo "::notice::tagged Go module $gotag"

  # --------------------------------------------------------------------------
  # GitHub Release: create a DRAFT, attach every built artefact, then publish-
  # release flips it to published (immutability-ready ordering).
  # --------------------------------------------------------------------------
  github-release:
    name: Attach assets to the draft GitHub Release
    timeout-minutes: 45
    needs: [cargo-publish, python-publish, node-publish, wasm-publish, cli-binaries, c-abi-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Resolve target tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ] && [[ "$REF" == refs/tags/* ]]; then
            tag="$REF_NAME"
          else
            tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          fi
          if [ -z "$tag" ]; then
            echo "::error::no v* tag found to attach assets to"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "::notice::attaching assets to release $tag"
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Stage release assets
        run: |
          set -e
          mkdir -p release-assets
          find artifacts -type f -name "*.whl" -exec cp {} release-assets/ \;
          find artifacts -type f -name "*.tar.gz" -exec cp {} release-assets/ \;
          find artifacts -type f -name "*.node" -exec cp {} release-assets/ \;
          find artifacts -type f -name "wickra-strategy-ci-*.tgz" -exec cp {} release-assets/ \;
          find artifacts -type f -name "*.crate" -exec cp {} release-assets/ \;
          find artifacts -type f -name "*.cdx.json" -exec cp {} release-assets/ \;
          find artifacts -type f -name "*.nupkg" -exec cp {} release-assets/ \;
          ls -lh release-assets/
          echo "asset-count=$(ls release-assets/ | wc -l)"
      - name: Create / update the draft GitHub Release with assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: wickra-strategy-ci ${{ steps.tag.outputs.tag }}
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: true
          body: |
            wickra-strategy-ci ${{ github.ref_name }} — Jest for trading strategies: golden-pin a strategy's backtest report, catch regressions in CI, and property/fuzz-test it against perturbed data. Native Rust, Python, Node.js, WASM plus a C ABI hub for C, C++, C#, Go, Java, R, and a composite GitHub Action.

            ### Install

            ```bash
            cargo install wickra-strategy-ci-cli
            pip install wickra-strategy-ci
            npm install wickra-strategy-ci
            dotnet add package Wickra.StrategyCi
            go get github.com/wickra-lib/wickra-strategy-ci/bindings/go
            ```

            GitHub Action:

            ```yaml
            - uses: wickra-lib/wickra-strategy-ci@v1
              with: { tests: tests, data: data }
            ```

            Java (Maven Central):

            ```xml
            <dependency>
              <groupId>org.wickra</groupId>
              <artifactId>wickra-strategy-ci</artifactId>
              <version>${{ steps.tag.outputs.version }}</version>
            </dependency>
            ```

            R (r-universe):

            ```r
            install.packages("wickrastrategyci", repos = "https://wickra-lib.r-universe.dev")
            ```

            ### Attached assets

            Pre-built artefacts for every supported platform — the same files this
            workflow run published to crates.io, PyPI, and npm — plus standalone
            CLI binaries and the C ABI libraries. C# ships to NuGet, Java to Maven
            Central, the in-repo Go module is tagged `bindings/go/${{ steps.tag.outputs.tag }}`,
            and R ships to r-universe via their own release jobs.

            ### Auto-generated changelog

            See below; GitHub computes it from the commits since the previous tag.

  # --------------------------------------------------------------------------
  # Build provenance attestations
  # --------------------------------------------------------------------------
  attestations:
    name: Attest build provenance
    timeout-minutes: 45
    needs: [cargo-publish, python-wheels, python-sdist, github-release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Download crate files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: crate-files
          path: artifacts/crates
      - name: Download wheels + sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          path: artifacts/python
          merge-multiple: true
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/crates/*.crate
            artifacts/python/*.whl
            artifacts/python/*.tar.gz
      - name: Attach provenance bundle to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.github-release.outputs.tag }}
          BUNDLE: ${{ steps.attest.outputs.bundle-path }}
        run: |
          if [ -z "$TAG" ]; then
            echo "::error::no tag resolved from github-release; cannot attach provenance."
            exit 1
          fi
          if [ -z "$BUNDLE" ] || [ ! -f "$BUNDLE" ]; then
            echo "::error::attestation bundle not found at '$BUNDLE'."
            exit 1
          fi
          dest="wickra-strategy-ci-${TAG}.provenance.intoto.jsonl"
          cp "$BUNDLE" "$dest"
          echo "Uploading $dest to release $TAG"
          gh release upload "$TAG" "$dest" --clobber --repo "${{ github.repository }}"

  # --------------------------------------------------------------------------
  # Publish the drafted release LAST (immutability-ready).
  # --------------------------------------------------------------------------
  publish-release:
    name: Publish the GitHub Release
    timeout-minutes: 45
    needs: [github-release, attestations]
    if: always() && needs.github-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Flip the draft release to published (latest)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.github-release.outputs.tag }}
        run: |
          if [ -z "$TAG" ]; then
            echo "::error::no tag resolved from github-release; cannot publish."
            exit 1
          fi
          echo "::notice::publishing release $TAG (draft -> published, latest)"
          gh release edit "$TAG" --draft=false --latest --repo "${{ github.repository }}"

  # --------------------------------------------------------------------------
  # Move the major-version tag (v1) to this release so `uses:
  # wickra-lib/wickra-strategy-ci@v1` picks up patch and minor updates. Runs
  # only after the release is published successfully.
  # --------------------------------------------------------------------------
  major-tag:
    name: Move the @vN major tag
    timeout-minutes: 15
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
      - name: Force-update the major tag to the release commit
        shell: bash
        run: |
          set -e
          major="v${GITHUB_REF_NAME#v}"; major="${major%%.*}"   # v1.2.3 -> v1
          git config user.name "wickra-bot"
          git config user.email "support@wickra.org"
          git tag -f "$major" "$GITHUB_SHA"
          git push origin -f "refs/tags/$major"
          echo "::notice::moved $major to $GITHUB_SHA"
